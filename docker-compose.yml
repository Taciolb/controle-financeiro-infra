services:

  # ==================== BANCOS ====================

  postgres-usuarios:
    image: postgres:15-alpine
    container_name: postgres-usuarios
    environment:
      POSTGRES_DB: CF_usuarios
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - financeiro-network

  postgres-centrocusto:
    image: postgres:15-alpine
    container_name: postgres-centrocusto
    environment:
      POSTGRES_DB: CF_centrocusto
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    networks:
      - financeiro-network

  postgres-lancamentos:
    image: postgres:15-alpine
    container_name: postgres-lancamentos
    environment:
      POSTGRES_DB: CF_lancamentos
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    networks:
      - financeiro-network

  postgres-notificacao:
    image: postgres:15-alpine
    container_name: postgres-notificacao
    environment:
      POSTGRES_DB: CF_notificacao
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    networks:
      - financeiro-network

  postgres-evolution:
    image: postgres:15-alpine
    container_name: postgres-evolution
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5437:5432"
    networks:
      - financeiro-network

  # ==================== MICROSSERVIÇOS ====================

  ms-usuarios:
    build: ../ms-usuarios
    container_name: ms-usuarios
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-usuarios:5432/CF_usuarios
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      - postgres-usuarios
    networks:
      - financeiro-network

  ms-centro-custo:
    build: ../ms-centro-custo
    container_name: ms-centro-custo
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-centrocusto:5432/CF_centrocusto
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      - postgres-centrocusto
    networks:
      - financeiro-network

  ms-lancamentos:
    build: ../ms-lancamentos
    container_name: ms-lancamentos
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-lancamentos:5432/CF_lancamentos
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MS_CENTRO_CUSTO_URL: http://ms-centro-custo:8082
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - postgres-lancamentos
      - ms-centro-custo
    networks:
      - financeiro-network

  ms-fluxo-caixa:
    build: ../ms-fluxo-caixa
    container_name: ms-fluxo-caixa
    ports:
      - "8084:8084"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MS_LANCAMENTOS_URL: http://ms-lancamentos:8083
    depends_on:
      - ms-lancamentos
    networks:
      - financeiro-network

  bff-financeiro:
    build: ../bff-financeiro
    container_name: bff-financeiro
    ports:
      - "8085:8085"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MS_LANCAMENTOS_URL: http://ms-lancamentos:8083
      MS_CENTRO_CUSTO_URL: http://ms-centro-custo:8082
      MS_FLUXO_CAIXA_URL: http://ms-fluxo-caixa:8084
    depends_on:
      - ms-lancamentos
      - ms-centro-custo
      - ms-fluxo-caixa
    networks:
      - financeiro-network

  ms-notificacao:
    build: ../ms-notificacao
    container_name: ms-notificacao
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notificacao:5432/CF_notificacao
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MS_LANCAMENTOS_URL: http://ms-lancamentos:8083
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      WHATSAPP_ENABLED: "false"
    depends_on:
      - postgres-notificacao
      - ms-lancamentos
      - evolution-api
    networks:
      - financeiro-network

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    ports:
      - "8089:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-evolution:5432/evolution
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"
      QRCODE_LIMIT: 30
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      - postgres-evolution
    networks:
      - financeiro-network

  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      MS_USUARIOS_URL: http://ms-usuarios:8081
      MS_LANCAMENTOS_URL: http://ms-lancamentos:8083
      MS_CENTRO_CUSTO_URL: http://ms-centro-custo:8082
      MS_FLUXO_CAIXA_URL: http://ms-fluxo-caixa:8084
    depends_on:
      - ms-usuarios
      - ms-lancamentos
      - ms-centro-custo
      - ms-fluxo-caixa
      - bff-financeiro
    networks:
      - financeiro-network

networks:
  financeiro-network:
    driver: bridge

volumes:
  evolution_instances:
  evolution_store: